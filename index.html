<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סורק לוח רישוי מהיר</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .camera-container {
            position: relative;
            width: 100vw;
            height: 70vh;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            box-sizing: border-box;
            border-style: solid;
            border-color: rgba(0, 0, 0, 0.6); 
        }

        .scan-box {
            position: absolute;
            border: 3px solid #ffcc00;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.5);
            border-radius: 8px;
            pointer-events: none;
        }

        .controls {
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            background: #222;
            height: 30vh;
        }

        input[type="text"] {
            width: 80%;
            max-width: 300px;
            padding: 12px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 2px;
            border: 2px solid #555;
            border-radius: 5px;
            background: #333;
            color: #fff;
        }

        button {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            color: black;
            background-color: #ffcc00;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        .status {
            font-size: 16px;
            color: #ffcc00;
            text-align: center;
            padding: 0 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="camera-container">
        <video id="video" autoplay playsinline muted></video>
        <div class="overlay" id="overlay"></div>
        <div class="scan-box" id="scanBox"></div>
    </div>

    <div class="controls">
        <input type="text" id="resultInput" placeholder="מספר הרכב יופיע כאן" readonly>
        <button id="snapBtn">סרוק מספר</button>
        <div class="status" id="statusText">יוזם מערכת...</div>
    </div>

    <canvas id="hiddenCanvas" style="display:none;"></canvas>

    <script>
        // וידאו ואלמנטים
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const scanBox = document.getElementById('scanBox');
        const snapBtn = document.getElementById('snapBtn');
        const resultInput = document.getElementById('resultInput');
        const statusText = document.getElementById('statusText');
        const hiddenCanvas = document.getElementById('hiddenCanvas');

        const API_TOKEN = "5644225f147e0835c15d2f6127676b324d6e5862"; 
        const boxWidthPct = 75;  
        const boxHeightPct = 15; 

        function updateOverlayLayout() {
            const containerWidth = video.parentElement.clientWidth;
            const containerHeight = video.parentElement.clientHeight;

            const boxWidth = (containerWidth * boxWidthPct) / 100;
            const boxHeight = (containerHeight * boxHeightPct) / 100;

            const boxLeft = (containerWidth - boxWidth) / 2;
            const boxTop = (containerHeight - boxHeight) / 2;

            scanBox.style.width = `${boxWidth}px`;
            scanBox.style.height = `${boxHeight}px`;
            scanBox.style.left = `${boxLeft}px`;
            scanBox.style.top = `${boxTop}px`;

            overlay.style.borderWidth = `${boxTop}px ${boxLeft}px ${containerHeight - boxTop - boxHeight}px ${boxLeft}px`;
        }

        async function startCamera() {
            try {
                statusText.innerText = "מבקש גישה למצלמה (נא לאשר בדפדפן)...";
                
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    statusText.innerText = "שגיאה: הדפדפן או הכתובת (HTTP) לא תומכים בגישה למצלמה.";
                    return;
                }

                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: "environment",
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });
                
                video.srcObject = stream;
                statusText.innerText = "המצלמה פעילה! מקם את לוח הרישוי בריבוע הצהוב";
                
                video.onloadedmetadata = () => {
                    updateOverlayLayout();
                    window.addEventListener('resize', updateOverlayLayout);
                };
            } catch (err) {
                console.error("Camera error:", err);
                statusText.innerText = "שגיאה קריטית: " + err.name + " - " + err.message;
            }
        }

        function captureCrop() {
            const ctx = hiddenCanvas.getContext('2d');
            const videoWidth = video.videoWidth;
            const videoHeight = video.videoHeight;
            const displayWidth = video.clientWidth;
            const displayHeight = video.clientHeight;

            const scaleX = videoWidth / displayWidth;
            const scaleY = videoHeight / displayHeight;

            const boxLeft = parseFloat(scanBox.style.left);
            const boxTop = parseFloat(scanBox.style.top);
            const boxWidth = parseFloat(scanBox.style.width);
            const boxHeight = parseFloat(scanBox.style.height);

            const cropX = boxLeft * scaleX;
            const cropY = boxTop * scaleY;
            const cropW = boxWidth * scaleX;
            const cropH = boxHeight * scaleY;

            hiddenCanvas.width = cropW;
            hiddenCanvas.height = cropH;

            ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);
            
            return new Promise((resolve) => {
                hiddenCanvas.toBlob((blob) => { resolve(blob); }, 'image/jpeg', 0.90);
            });
        }

        function formatIsraeliLicensePlate(rawText) {
            const cleanNumber = rawText.replace(/\D/g, '');

            if (cleanNumber.length === 7) {
                return `${cleanNumber.slice(0, 2)}-${cleanNumber.slice(2, 5)}-${cleanNumber.slice(5, 7)}`;
            } else if (cleanNumber.length === 8) {
                return `${cleanNumber.slice(0, 3)}-${cleanNumber.slice(3, 5)}-${cleanNumber.slice(5, 8)}`;
            }
            return null; 
        }

        async function processOCR() {
            if (!video.srcObject) {
                statusText.innerText = "לא ניתן לסרוק, המצלמה אינה פעילה.";
                return;
            }

            statusText.innerText = "שולח תמונה לזיהוי מהיר...";
            resultInput.value = "";
            
            const imageBlob = await captureCrop();
            const formData = new FormData();
            formData.append('upload', imageBlob, 'plate.jpg');
            formData.append('regions', 'il'); 

            try {
                const response = await fetch('https://api.platerecognizer.com/v1/plate-reader/', {
                    method: 'POST',
                    headers: {
                        'Authorization': API_TOKEN === "YOUR_API_TOKEN" ? 'Token 1fba96be73bbbc54bc2792c6b4fcbe1ae6d43e5c' : `Token ${API_TOKEN}`
                    },
                    body: formData
                });

                const data = await response.json();
                
                if (data.results && data.results.length > 0) {
                    const rawPlate = data.results[0].plate; 
                    const formattedPlate = formatIsraeliLicensePlate(rawPlate);

                    if (formattedPlate) {
                        resultInput.value = formattedPlate;
                        statusText.innerText = "הזיהוי הושלם בהצלחה!";
                    } else {
                        statusText.innerText = `זוהה מספר לא תקני (${rawPlate}), נסה שוב.`;
                    }
                } else {
                    statusText.innerText = "לא נמצא לוח רישוי, ודא שהמספר ממלא את הריבוע הצהוב.";
                }

            } catch (error) {
                console.error(error);
                statusText.innerText = "שגיאה בתקשורת עם שרת הזיהוי.";
            }
        }

        snapBtn.addEventListener('click', processOCR);
        
        // הפעלה מיידית ללא תנאי
        startCamera();
    </script>
</body>
</html>
