<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סורק לוח רישוי מהיר</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .camera-container {
            position: relative;
            width: 100vw;
            height: 70vh;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            box-sizing: border-box;
            border-style: solid;
            border-color: rgba(0, 0, 0, 0.6); 
        }

        .scan-box {
            position: absolute;
            border: 3px solid #ffcc00;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.5);
            border-radius: 8px;
            pointer-events: none;
        }

        .controls {
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            background: #222;
            height: 30vh;
        }

        input[type="text"] {
            width: 80%;
            max-width: 300px;
            padding: 12px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 2px;
            border: 2px solid #555;
            border-radius: 5px;
            background: #333;
            color: #fff;
        }

        button {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            color: black;
            background-color: #ffcc00;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        .status {
            font-size: 16px;
            color: #ffcc00;
            text-align: center;
            padding: 0 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="camera-container">
        <video id="video" autoplay playsinline muted></video>
        <div class="overlay" id="overlay"></div>
        <div class="scan-box" id="scanBox"></div>
    </div>

    <div class="controls">
        <input type="text" id="resultInput" placeholder="מספר הרכב יופיע כאן" readonly>
        <button id="snapBtn">סרוק מספר</button>
        <div class="status" id="statusText">יוזם מערכת...</div>
    </div>

    <canvas id="hiddenCanvas" style="display:none;"></canvas>

    <script>
                    // וידאו ואלמנטים
const video = document.getElementById('video');
const overlay = document.getElementById('overlay');
const scanBox = document.getElementById('scanBox');
const snapBtn = document.getElementById('snapBtn');
const resultInput = document.getElementById('resultInput');
const statusText = document.getElementById('statusText');
const hiddenCanvas = document.getElementById('hiddenCanvas');

// *** שים כאן את הטוקן האישי שלך לפעולה חלקה ללא חסימות ***
const API_TOKEN = "YOUR_API_TOKEN"; 

const boxWidthPct = 75;  
const boxHeightPct = 15; 

function updateOverlayLayout() {
    const containerWidth = video.parentElement.clientWidth;
    const containerHeight = video.parentElement.clientHeight;

    const boxWidth = (containerWidth * boxWidthPct) / 100;
    const boxHeight = (containerHeight * boxHeightPct) / 100;

    const boxLeft = (containerWidth - boxWidth) / 2;
    const boxTop = (containerHeight - boxHeight) / 2;

    scanBox.style.width = `${boxWidth}px`;
    scanBox.style.height = `${boxHeight}px`;
    scanBox.style.left = `${boxLeft}px`;
    scanBox.style.top = `${boxTop}px`;

    overlay.style.borderWidth = `${boxTop}px ${boxLeft}px ${containerHeight - boxTop - boxHeight}px ${boxLeft}px`;
}

async function startCamera() {
    try {
        statusText.innerText = "מבקש גישה למצלמה...";
        
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            statusText.innerText = "שגיאה: הדפדפן לא תומך במצלמה.";
            return;
        }

        const stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: "environment",
                width: { ideal: 1280 },
                height: { ideal: 720 }
            },
            audio: false
        });
        
        video.srcObject = stream;
        statusText.innerText = "המצלמה פעילה! מקם את לוח הרישוי בריבוע הצהוב";
        
        video.onloadedmetadata = () => {
            updateOverlayLayout();
            window.addEventListener('resize', updateOverlayLayout);
        };
    } catch (err) {
        statusText.innerText = "שגיאה בקבלת וידאו: " + err.message;
    }
}

function captureCrop() {
    const ctx = hiddenCanvas.getContext('2d');
    
    // רזולוציית המקור של הוידאו
    const videoWidth = video.videoWidth;
    const videoHeight = video.videoHeight;
    
    // גודל הוידאו כפי שהוא מוצג בפועל על המסך
    const displayWidth = video.clientWidth;
    const displayHeight = video.clientHeight;

    // חישוב פקטור ההתאמה (מטפל במצבי Cover/Contain)
    const videoRatio = videoWidth / videoHeight;
    const displayRatio = displayWidth / displayHeight;
    
    let actualWidth = displayWidth;
    let actualHeight = displayHeight;
    let xOffset = 0;
    let yOffset = 0;

    if (videoRatio > displayRatio) {
        actualWidth = displayHeight * videoRatio;
        xOffset = (actualWidth - displayWidth) / 2;
    } else {
        actualHeight = displayWidth / videoRatio;
        yOffset = (actualHeight - displayHeight) / 2;
    }

    const scale = videoWidth / actualWidth;

    const boxLeft = parseFloat(scanBox.style.left) + xOffset;
    const boxTop = parseFloat(scanBox.style.top) + yOffset;
    const boxWidth = parseFloat(scanBox.style.width);
    const boxHeight = parseFloat(scanBox.style.height);

    const cropX = boxLeft * scale;
    const cropY = boxTop * scale;
    const cropW = boxWidth * scale;
    const cropH = boxHeight * scale;

    hiddenCanvas.width = cropW;
    hiddenCanvas.height = cropH;

    ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);
    
    // --- יצירת הצצה ויזואלית (Preview) כדי לראות מה נחתך ---
    let previewImg = document.getElementById('cropPreview');
    if (!previewImg) {
        previewImg = document.createElement('img');
        previewImg.id = 'cropPreview';
        previewImg.style = "width: 200px; margin-top: 10px; border: 2px solid white;";
        document.querySelector('.controls').appendChild(previewImg);
    }
    previewImg.src = hiddenCanvas.toDataURL('image/jpeg');
    // ----------------------------------------------------

    return new Promise((resolve) => {
        hiddenCanvas.toBlob((blob) => { resolve(blob); }, 'image/jpeg', 0.95);
    });
}

function formatIsraeliLicensePlate(rawText) {
    const cleanNumber = rawText.replace(/\D/g, '');

    if (cleanNumber.length === 7) {
        return `${cleanNumber.slice(0, 2)}-${cleanNumber.slice(2, 5)}-${cleanNumber.slice(5, 7)}`;
    } else if (cleanNumber.length === 8) {
        return `${cleanNumber.slice(0, 3)}-${cleanNumber.slice(3, 5)}-${cleanNumber.slice(5, 8)}`;
    }
    return null; 
}

async function processOCR() {
    if (!video.srcObject) return;

    statusText.innerText = "מבצע חיתוך ושולח לזיהוי...";
    resultInput.value = "";
    
    const imageBlob = await captureCrop();
    const formData = new FormData();
    formData.append('upload', imageBlob, 'plate.jpg');
    formData.append('regions', 'il'); 

    try {
        const tokenToUse = API_TOKEN === "YOUR_API_TOKEN" ? 'Token 1fba96be73bbbc54bc2792c6b4fcbe1ae6d43e5c' : `Token ${API_TOKEN}`;
        
        const response = await fetch('https://api.platerecognizer.com/v1/plate-reader/', {
            method: 'POST',
            headers: { 'Authorization': tokenToUse },
            body: formData
        });

        if (response.status === 403 || response.status === 401) {
            statusText.innerText = "שגיאה: הטוקן חסום או הגיע למגבלה. יש להשתמש בטוקן אישי.";
            return;
        }

        const data = await response.json();
        
        if (data.results && data.results.length > 0) {
            const rawPlate = data.results[0].plate; 
            const formattedPlate = formatIsraeliLicensePlate(rawPlate);

            if (formattedPlate) {
                resultInput.value = formattedPlate;
                statusText.innerText = "הזיהוי הושלם בהצלחה!";
            } else {
                statusText.innerText = `זוהה מספר חלקי/לא תקני: ${rawPlate}`;
            }
        } else {
            statusText.innerText = "לוח הרישוי לא נמצא בתמונה החתוכה (ראה הצצה למטה).";
        }

    } catch (error) {
        console.error(error);
        statusText.innerText = "שגיאת רשת/תקשורת עם שרת ה-OCR.";
    }
}

snapBtn.addEventListener('click', processOCR);
startCamera();
    </script>
</body>
</html>
