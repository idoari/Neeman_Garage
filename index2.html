<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סורק מספרי רישוי ותמלול</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            box-sizing: border-box;
            margin-bottom: 20px;
        }
		
		.plate-container {
			display: inline-flex;
			align-items: center;
			border: 4px solid black;
			border-radius: 10px; 
			background: #FFD700;
			overflow: hidden;
		}

		/* הפס הכחול */
		.blue-strip {
			width: 70px;
			height: 80px;
			background: linear-gradient(#0038A8, #0050D0);
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			gap: 3px;
			color: white;
			font-weight: bold;
			font-size: 12px;
			text-align: center;
		}

		/* דגל ישראל ב-CSS */
		.flag {
			width: 26px;
			height: 18px;
			background: white;
			position: relative;
			border: 1px solid white;
		}

		.flag::before,
		.flag::after {
			content: "";
			position: absolute;
			left: 0;
			right: 0;
			height: 2px;
			background: #0038A8;
		}

		.flag::before {
			top: 3px;
		}

		.flag::after {
			bottom: 3px;
		}

		/* מגן דוד פשוט */
		.flag span {
			position: absolute;
			inset: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 10px;
			color: #0038A8;
		}

		/* שדה המספר */
		.plate-input {
			width: 260px;
			height: 80px;
			border: none;
			outline: none;
			font-size: 32px;
			text-align: center;
			background: transparent;
			font-weight: bold;
			letter-spacing: 5px;
		}
		
        h1, h2 { color: #333; margin-bottom: 20px; font-size: 1.5em; }
        h2 { font-size: 1.2em; border-top: 1px solid #eee; padding-top: 15px; margin-top: 15px; text-align: right; }
        
        video, canvas {
            width: 100%;
            max-height: 300px;
            border-radius: 8px;
            background: #000;
            margin-bottom: 15px;
        }
        canvas { display: none; } 
        
        button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background-color: #007bff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 15px;
            transition: background 0.2s;
        }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        
        .btn-secondary { background-color: #28a745; }
        .btn-secondary:hover { background-color: #218838; }
        .btn-audio { background-color: #6c757d; }
        .btn-audio:hover { background-color: #5a6268; }
        .recording-active { animation: pulse 1.5s infinite; background-color: #dc3545 !important; }
        
        .form-group {
            margin-bottom: 12px;
            text-align: right;
        }
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #555; }
        input[type="text"], input[type="number"], textarea {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            color: #333;
        }
        input[readonly] { background-color: #e9ecef; color: #495057; }
        #plate_number { font-size: 24px; text-align: center; font-weight: bold; border: 2px solid #007bff; }
        
        #status, .status-small {
            color: #666;
            font-style: italic;
            margin-top: 10px;
            margin-bottom: 10px;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>סורק לוחית רישוי</h1>
	<div class="plate-container">

    <!-- פס כחול -->
    <div class="blue-strip">
        <div class="flag">
            <span>✡</span>
        </div>
        <div>IL</div>
        <div>ישראל</div>
    </div>

    <!-- מספר רכב -->
    <input 
        type="text" 
        class="plate-input"
        maxlength="10"
        oninput="formatPlate(this)"
        placeholder="00-000-00"
		required
    >

</div>
    <button id="capture-btn">צלם וסרוק מספר</button>
    <div id="status">מפעיל מצלמה...</div>
</div>

<div class="container">
    <h2>פרטי הרכב מהמאגר</h2>
    <div class="form-group">
        <label>מספר רישוי (plate_number)</label>
        <input type="text" id="plate_number" placeholder="המספר יופיע כאן">
    </div>
    <button id="btn-fetch-gov" class="btn-secondary" disabled>משוך נתונים ממשלתיים</button>
    <div id="gov-status" class="status-small"></div>
    
    <div class="form-group">
        <label>יצרן רכב (car_manufacturer)</label>
        <input type="text" id="car_manufacturer" readonly>
    </div>
    <div class="form-group">
        <label>דגם רכב (car_model)</label>
        <input type="text" id="car_model" readonly>
    </div>
    <div class="form-group">
        <label>שנת ייצור (car_year)</label>
        <input type="number" id="car_year" readonly>
    </div>
</div>

<div class="container">
    <h2>הקלטה קולית ושמירה</h2>
    <div class="form-group">
        <label>הקלטת שמע ותמלול בזמן אמת</label>
        <button id="btn-record" class="btn-audio">🎤 התחל הקלטה ותמלול</button>
    </div>
    <div class="form-group">
        <label>הערות / טקסט מתומלל (transcribed_text)</label>
        <textarea id="transcribed_text" rows="3" placeholder="לחץ על כפתור ההקלטה ודבר..."></textarea>
    </div>
    
    <button id="btn-save-db" disabled>💾 שמור הכל בבסיס הנתונים</button>
    <div id="db-status" class="status-small"></div>
</div>

<script>

	function formatPlate(input) {
    let value = input.value.replace(/[^0-9]/g, '');

    // הגבלת אורך
    if (value.length > 8) {
        value = value.slice(0, 8);
    }

    // עיצוב עם מקפים
    if (value.length <= 7) {
        // פורמט: 12-345-67
        value = value.replace(/^(\d{0,2})(\d{0,3})(\d{0,2})$/, function(_, a, b, c) {
            return [a, b, c].filter(Boolean).join('-');
        });
    } else {
        // פורמט: 123-45-678
        value = value.replace(/^(\d{0,3})(\d{0,2})(\d{0,3})$/, function(_, a, b, c) {
            return [a, b, c].filter(Boolean).join('-');
        });
    }

    input.value = value;
}

    // הגדרות חיבור ל-Supabase
    const SUPABASE_URL = "https://mdnwgdbdmnozcsmxiupt.supabase.co";
    const SUPABASE_KEY = "sb_publishable_AxtO6kLoX9eHmzTIoBKD3w_ISvabvy3";
    let supabase = null;
    
    try {
        if(SUPABASE_URL !== "https://mdnwgdbdmnozcsmxiupt.supabase.co") {
            supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }
    } catch(e) { console.error("Supabase init error", e); }

    // אלמנטים
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const captureBtn = document.getElementById('capture-btn');
    const statusDiv = document.getElementById('status');
    
    const inputPlate = document.getElementById('plate_number');
    const btnFetchGov = document.getElementById('btn-fetch-gov');
    const govStatus = document.getElementById('gov-status');
    const inputManuf = document.getElementById('car_manufacturer');
    const inputModel = document.getElementById('car_model');
    const inputYear = document.getElementById('car_year');
    
    const btnRecord = document.getElementById('btn-record');
    const txtTranscribed = document.getElementById('transcribed_text');
    const btnSaveDb = document.getElementById('btn-save-db');
    const dbStatus = document.getElementById('db-status');

    let mediaRecorder;
    let audioChunks = [];
    let audioBlob = null;
    
    // הגדרת מנוע זיהוי דיבור (Speech Recognition)
    let recognition;
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = true; // הקלטה רציפה
        recognition.interimResults = true; // הצגת תוצאות זמניות תוך כדי דיבור
        recognition.lang = 'he-IL'; // שפה: עברית
    } else {
        console.warn("דפדפן זה אינו תומך בתמלול קולי מובנה (השתמש ב-Chrome או Android).");
    }

    // --- הפעלת מצלמה ---
    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment' },
                audio: false
            });
            video.srcObject = stream;
            statusDiv.innerText = "המצלמה מוכנה לשימוש";
        } catch (err) {
            console.error("שגיאה בגישה למצלמה: ", err);
            statusDiv.innerText = "לא ניתן לגשת למצלמה. ודא שאתה משתמש ב-HTTPS.";
            captureBtn.disabled = true;
        }
    }

    // --- מנגנון ה-OCR ---
    async function captureAndRecognize() {
        statusDiv.innerText = "מצלם ומעבד תמונה...";
        inputPlate.value = ""; 
        
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        const context = canvas.getContext('2d');
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        try {
            const result = await Tesseract.recognize(
                canvas,
                'eng',
                {
                    logger: m => {
                        if(m.status === 'recognizing text') {
                            statusDiv.innerText = `סורק... ${Math.round(m.progress * 100)}%`;
                        }
                    },
                    config: {
                        tessedit_char_whitelist: '0123456789'
                    }
                }
            );

            const rawText = result.data.text;
            const cleanNumber = rawText.replace(/[^0-9]/g, '');

            if (cleanNumber) {
                inputPlate.value = cleanNumber;
                statusDiv.innerText = "הסריקה הושלמה בהצלחה!";
                btnFetchGov.disabled = false;
            } else {
                statusDiv.innerText = "לא זוהו ספרות, נסה שוב מזווית טובה יותר.";
            }

        } catch (error) {
            console.error(error);
            statusDiv.innerText = "שגיאה בתהליך ה-OCR.";
        }
    }

    inputPlate.addEventListener('input', () => {
        btnFetchGov.disabled = inputPlate.value.trim() === "";
    });

    // --- שליפת נתונים משרד התחבורה ---
    btnFetchGov.addEventListener('click', async () => {
        if(!supabase) {
            govStatus.innerText = "שגיאה: יש להגדיר קודם את מפתחות Supabase בקוד.";
            return;
        }
        govStatus.innerText = "פונה למאגר משרד התחבורה...";
        btnSaveDb.disabled = true;
        
        try {
            const { data, error } = await supabase.functions.invoke('get-vehicle-data', {
                body: { plateNumber: inputPlate.value.trim() }
            });

            if (error) throw error;

            if (data && data.found) {
                inputManuf.value = data.manufacturer;
                inputModel.value = data.model;
                inputYear.value = data.year;
                govStatus.innerText = "הנתונים נשלפו בהצלחה!";
                btnSaveDb.disabled = false;
            } else {
                govStatus.innerText = data.message || "הרכב לא נמצא במאגר הממשלתי.";
                inputManuf.value = ""; inputModel.value = ""; inputYear.value = "";
                btnSaveDb.disabled = false;
            }
        } catch (e) {
            govStatus.innerText = "שגיאה בתקשורת: " + e.message;
        }
    });

    // --- מנגנון הקלטת קול משולב עם תמלול (הקוד המתוקן) ---
    btnRecord.addEventListener('click', async () => {
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            audioChunks = [];
            txtTranscribed.value = ""; // איפוס הטקסט הקודם
            
            try {
                // א. בקשת גישה למיקרופון עבור הקלטת קובץ השמע
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                };

                // ב. הפעלת ההקלטה
                mediaRecorder.start();
                btnRecord.innerText = "🛑 עצור הקלטה ותמלול";
                btnRecord.classList.add('recording-active');

                // ג. הפעלת מנוע התמלול (Speech Recognition) במקביל
                if (recognition) {
                    recognition.onresult = (event) => {
                        let interimTranscript = '';
                        let finalTranscript = '';

                        for (let i = event.resultIndex; i < event.results.length; ++i) {
                            if (event.results[i].isFinal) {
                                finalTranscript += event.results[i][0].transcript;
                            } else {
                                interimTranscript += event.results[i][0].transcript;
                            }
                        }
                        // עדכון תיבת הטקסט בזמן אמת
                        txtTranscribed.value = finalTranscript || interimTranscript;
                    };

                    recognition.onerror = (err) => {
                        console.error("Speech recognition error", err);
                    };

                    recognition.start();
                } else {
                    txtTranscribed.placeholder = "ההקלטה עובדת, אך הדפדפן שלך אינו תומך בתמלול אוטומטי לעברית.";
                }

            } catch (err) {
                alert("לא ניתן לגשת למיקרופון: " + err.message);
            }
        } else {
            // עצירת ההקלטה והתמלול
            mediaRecorder.stop();
            if (recognition) {
                recognition.stop();
            }
            btnRecord.innerText = "🎤 הקלט ותמלל שוב";
            btnRecord.classList.remove('recording-active');
        }
    });

    // --- שמירה ל-Supabase DB ---
    btnSaveDb.addEventListener('click', async () => {
        if(!supabase) return;
        dbStatus.innerText = "שומר נתונים במערכת...";
        btnSaveDb.disabled = true;
        let fileUrl = null;

        try {
            if (audioBlob) {
                dbStatus.innerText = "מעלה קובץ שמע לענן...";
                const fileName = `audio_${Date.now()}_${inputPlate.value.trim()}.mp3`;
                const { data: uploadData, error: uploadError } = await supabase.storage
                    .from('vehicle-records')
                    .upload(fileName, audioBlob);

                if (uploadError) throw uploadError;

                const { data: urlData } = supabase.storage
                    .from('vehicle-records')
                    .getPublicUrl(fileName);
                    
                fileUrl = urlData.publicUrl;
            }

            dbStatus.innerText = "רושם בבסיס הנתונים...";
            const { error: dbError } = await supabase
                .from('vehicles')
                .upsert({ 
                    plate_number: inputPlate.value.trim(),
                    car_manufacturer: inputManuf.value,
                    car_model: inputModel.value,
                    car_year: inputYear.value ? parseInt(inputYear.value) : null,
                    record_file_url: fileUrl,
                    transcribed_text: txtTranscribed.value // כאן יישמר הטקסט שתומלל אוטומטית!
                });

            if (dbError) throw dbError;
            dbStatus.innerText = "✅ הרשומה נשמרה בטבלה בהצלחה!";
            audioBlob = null;
            
        } catch (e) {
            dbStatus.innerText = "❌ שגיאה בשמירה: " + e.message;
            btnSaveDb.disabled = false;
        }
    });

    captureBtn.addEventListener('click', captureAndRecognize);
    window.addEventListener('load', initCamera);
</script>

</body>
</html>
